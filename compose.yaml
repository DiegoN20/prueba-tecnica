services:
  db:
    image: 'mysql:8.0'
    container_name: academia-db
    environment:
      MYSQL_DATABASE: academia_db
      MYSQL_USER: myuser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - '3306:3306'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: academia-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      DB_URI: jdbc:mysql://db:3306/academia_db
      DB_USER: myuser
      DB_PASSWORD: secret
      DB_DRIVER: com.mysql.cj.jdbc.Driver

  frontend:
    build: ./frontend-academia
    container_name: academia-web
    ports:
      - '3000:80'
    depends_on:
      - backend